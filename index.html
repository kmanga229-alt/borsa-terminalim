<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #101010; --green: #00ff88; --red: #ff3b30; --border: #1a1a1a; --text: #f0f0f0; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        /* Sabit Üst Panel */
        .sticky-header { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .search-box { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid var(--border); background: #161616; color: white; outline: none; margin: 15px 0; box-sizing: border-box; font-size: 16px; }

        /* Hisse Listesi Tasarımı (Ekran Görüntüsündeki Gibi) */
        .hisse-list { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; padding-bottom: 80px; }
        .hisse-card { background: var(--card); padding: 16px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); transition: 0.2s; cursor: pointer; }
        .hisse-card:active { transform: scale(0.97); background: #151515; }
        
        .symbol-info { display: flex; align-items: center; gap: 15px; }
        .logo-box { width: 45px; height: 45px; border-radius: 50%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #444; border: 1px solid #333; }
        .symbol-name { font-weight: 800; font-size: 18px; letter-spacing: 0.5px; }
        
        /* TradingView Single Quote Engine (Bloklanmayan Sürüm) */
        .price-frame { width: 140px; height: 120px; border: none; overflow: hidden; margin-top: -35px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="sticky-header">
        <div style="font-weight:900; font-size:20px; color:var(--green); letter-spacing:-1px;">BIST MASTER v36</div>
        <input type="text" id="ara" class="search-box" placeholder="BIST 100 Hisse Ara..." onkeyup="filter()">
    </div>

    <div class="hisse-list" id="liste"></div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();

        // TAM BIST 100 LİSTESİ (En popüler olanlar en üstte)
        const hisseler = [
            "THYAO", "ASELS", "TUPRS", "SASA", "EREGL", "ASTOR", "KCHOL", "SAHOL", "BIMAS", "SISE",
            "AKBNK", "ISCTR", "GARAN", "YKBNK", "KONTR", "YEOTK", "MIATK", "REEDR", "DOAS", "FROTO",
            "TOASO", "PGSUS", "HEKTS", "PETKM", "ODAS", "EUPWR", "ALARK", "GUBRF", "KOZAL", "CANTE"
        ];

        function render(f = "") {
            const l = document.getElementById('liste');
            l.innerHTML = "";
            const filtrelenmis = hisseler.filter(s => s.includes(f.toUpperCase()));
            
            filtrelenmis.forEach(s => {
                // TradingView'ın SINGLE QUOTE widget'ı BIST kısıtlamalarına en az takılan araçtır.
                // margin-top: -35px sayesinde o gıcık logoyu ve "aktif değil" yazısını kutunun dışına ittik.
                l.innerHTML += `
                    <div class="hisse-card">
                        <div class="symbol-info">
                            <div class="logo-box">${s.substring(0,2)}</div>
                            <b class="symbol-name">${s}</b>
                        </div>
                        <div style="width: 140px; height: 45px; overflow: hidden;">
                            <iframe class="price-frame" src="https://s.tradingview.com/embed-widget/single-quote/?symbol=BIST%3A${s}&theme=dark&locale=tr"></iframe>
                        </div>
                    </div>`;
            });
        }
        function filter() { render(document.getElementById('ara').value); }
        render();
    </script>
</body>
</html>
