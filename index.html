<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST Terminal PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0b0b0b; --card: #121212; --green: #00ff88; --red: #ff3b30; --border: #1f1f1f; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* Arama Çubuğu */
        .header { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .search-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: #181818; color: white; outline: none; box-sizing: border-box; font-size: 15px; }

        /* Hisse Kartları (Fotoğraftaki Tasarım) */
        .hisse-list { display: flex; flex-direction: column; gap: 6px; margin-top: 15px; padding-bottom: 100px; }
        .hisse-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; height: 70px; overflow: hidden; }
        
        .symbol-name { font-weight: 800; font-size: 16px; letter-spacing: 0.5px; color: #fff; }

        /* 🎯 Sniper Engine: Google Finance'ı tam sağdan yakalar */
        .price-container { width: 130px; height: 50px; overflow: hidden; border-radius: 8px; position: relative; }
        .price-iframe { border: none; width: 160px; height: 160px; position: absolute; top: -55px; right: -15px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="ara" class="search-input" placeholder="🔍 Hisse ara (THYAO, SASA...)" onkeyup="filter()">
    </div>

    <div class="hisse-list" id="liste"></div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();

        // Fotoğraftaki ve en popüler BIST 100 hisseleri
        const hisseler = [
            "LXGYO", "GENKM", "THYAO", "SAHOL", "ASELS", "TUPRS", "BIMAS", "KCHOL", "SASA", "EREGL",
            "ASTOR", "KONTR", "YEOTK", "MIATK", "REEDR", "DOAS", "FROTO", "EGEEN", "ODAS", "PETKM"
        ];

        function render(f = "") {
            const l = document.getElementById('liste');
            l.innerHTML = "";
            const filtrelenmis = hisseler.filter(s => s.includes(f.toUpperCase()));
            
            // Dondurmaması için (Lazy Loading mantığı)
            const gosterilecek = f === "" ? filtrelenmis.slice(0, 15) : filtrelenmis;
            
            gosterilecek.forEach(s => {
                l.innerHTML += `
                    <div class="hisse-card">
                        <div class="symbol-name">${s}</div>
                        <div class="price-container">
                            <iframe class="price-iframe" src="https://www.google.com/finance/quote/${s}:IST" loading="lazy"></iframe>
                        </div>
                    </div>`;
            });
        }

        function filter() { render(document.getElementById('ara').value); }
        render();
    </script>
</body>
</html>
