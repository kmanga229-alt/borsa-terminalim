<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST Master</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #111; --green: #00ff88; --border: #222; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .hisse-list { display: flex; flex-direction: column; gap: 10px; }
        .hisse-card { background: var(--card); padding: 16px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); cursor: pointer; }
        #analiz { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; }
        .nav { padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        .chart-box { width: 100%; height: calc(100% - 60px); }
    </style>
</head>
<body>
    <div class="hisse-list" id="liste"></div>
    <div id="analiz">
        <div class="nav"><b id="baslik"></b><button onclick="kapat()" style="background:#333;color:#fff;border:none;padding:10px;border-radius:8px;">Kapat</button></div>
        <div id="chart-container" class="chart-box"></div>
    </div>
    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();
        const hisseler = ["THYAO", "ASELS", "TUPRS", "SASA", "EREGL", "KCHOL", "SAHOL", "ASTOR", "LXGYO"];

        function listele() {
            const l = document.getElementById('liste');
            hisseler.forEach(s => {
                l.innerHTML += `<div class="hisse-card" onclick="ac('${s}')"><b>${s}</b><span>Detay ></span></div>`;
            });
        }

        function ac(s) {
            document.getElementById('analiz').style.display = 'block';
            document.getElementById('baslik').innerText = s + " ANALİZ";
            // ENGELLENMEYEN TEK WIDGET: MİNİ SYMBOL OVERVIEW
            document.getElementById('chart-container').innerHTML = `
                <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=BIST%3A${s}&theme=dark&width=100%&height=100%&trendLineColor=%2300ff88&underLineColor=rgba(0%2C255%2C136%2C0.1)&locale=tr" 
                style="width:100%; height:100%; border:none;"></iframe>`;
        }

        function kapat() { document.getElementById('analiz').style.display = 'none'; document.getElementById('chart-container').innerHTML = ""; }
        listele();
    </script>
</body>
</html>
