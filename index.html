<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST PRO Terminal</title>
    <style>
        :root { --bg: #050505; --card: #121212; --green: #00ff88; --red: #ff3b30; --border: #1f1f1f; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 20px; font-weight: 900; color: var(--green); }
        
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; }

        .hisse-list { display: flex; flex-direction: column; gap: 10px; }
        .hisse-card { background: var(--card); padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); cursor: pointer; }
        
        /* Fiyat ve Değişim Alanı */
        .price-info { text-align: right; min-width: 100px; height: 40px; }
        
        #analizModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        .nav { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .back-btn { background: #222; border: none; color: white; padding: 8px 15px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">BIST PRO</div>
        <div style="font-size: 10px; color: var(--green); border: 1px solid var(--green); padding: 3px 8px; border-radius: 10px;">● CANLI VERİ</div>
    </div>

    <input type="text" id="ara" class="search-box" placeholder="Hisse veya Şirket Ara..." onkeyup="filterHisseler()">

    <div class="hisse-list" id="list"></div>

    <div id="analizModal">
        <div class="nav">
            <span id="title" style="font-weight:bold; color:var(--green);">ANALİZ</span>
            <button class="back-btn" onclick="closeModal()">GERİ DÖN</button>
        </div>
        <div id="chart" style="height: calc(100% - 60px);"></div>
    </div>

    <script>
        const hisseler = ["THYAO", "ASELS", "TUPRS", "SASA", "EREGL", "ASTOR", "KCHOL", "SAHOL", "BIMAS", "SISE"];

        function init() {
            const container = document.getElementById('list');
            container.innerHTML = "";
            hisseler.forEach(s => {
                container.innerHTML += `
                    <div class="hisse-card" onclick="openAnaliz('${s}')">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <div style="width:40px; height:40px; background:#1a1a1a; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold; color:#555; border:1px solid #333;">${s.substring(0,2)}</div>
                            <b>${s}</b>
                        </div>
                        <div class="price-info">
                            <iframe src="https://s.tradingview.com/embed-widget/single-quote/?symbol=BIST%3A${s}&theme=dark&locale=tr" style="width:100%; height:100%; border:none; pointer-events:none;"></iframe>
                        </div>
                    </div>`;
            });
        }

        function openAnaliz(s) {
            document.getElementById('analizModal').style.display = 'block';
            document.getElementById('title').innerText = s + " / BIST";
            // Teknik analiz için en sağlam ve hızlı widget
            document.getElementById('chart').innerHTML = `
                <iframe src="https://s.tradingview.com/embed-widget/technical-analysis/?symbol=BIST%3A${s}&theme=dark&locale=tr&interval=1D&width=100%&height=100%" style="width:100%; height:100%; border:none;"></iframe>
            `;
        }

        function closeModal() {
            document.getElementById('analizModal').style.display = 'none';
            document.getElementById('chart').innerHTML = "";
        }

        init();
    </script>
</body>
</html>
