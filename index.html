<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST PRO Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #080808; --green: #00ff88; --red: #ff3e3e; --gray: #888; --border: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        /* Sayfa Yapısı */
        .page { display: none; height: 100vh; flex-direction: column; }
        .page.active { display: flex; }

        /* Header & Arama */
        .header { padding: 15px; border-bottom: 1px solid var(--border); background: var(--bg); }
        .search-container { position: relative; width: 100%; }
        .search-bar { width: 100%; background: #121212; border: 1px solid var(--border); padding: 12px 12px 12px 35px; border-radius: 10px; color: white; outline: none; box-sizing: border-box; font-size: 15px; }
        .search-bar:focus { border-color: var(--green); }
        .search-icon { position: absolute; left: 12px; top: 13px; color: var(--gray); }

        /* Hisse Listesi */
        .content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .hisse-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); transition: 0.2s; }
        .hisse-row:active { background: #111; }
        
        .left { display: flex; align-items: center; gap: 12px; }
        .logo { width: 38px; height: 38px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #222; }
        .logo img { width: 85%; height: 85%; object-fit: contain; }
        
        .symbol-info { display: flex; flex-direction: column; }
        .symbol { font-weight: 800; font-size: 16px; }
        .name { font-size: 10px; color: var(--gray); text-transform: uppercase; }

        .right { text-align: right; }
        .price { font-weight: 800; font-size: 16px; margin-bottom: 4px; }
        .change { font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 4px; }
        .up { color: var(--green); background: rgba(0,255,136,0.1); }
        .down { color: var(--red); background: rgba(255,62,62,0.1); }

        /* Alt Navigasyon */
        .nav-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(15,15,15,0.95); border: 1px solid var(--border); border-radius: 20px; display: flex; justify-content: space-around; padding: 10px; backdrop-filter: blur(15px); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--gray); font-size: 10px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--green); }
        .nav-icon { font-size: 20px; }

        /* Grafik Ekranı */
        #chart-frame { width: 100%; height: 100%; border: none; }
        .back-btn { background: #222; border: none; color: white; padding: 8px 15px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div class="header">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-bar" placeholder="Hisse veya şirket ara..." oninput="handleSearch()">
            </div>
            <div style="margin-top:15px; font-size:12px; color:var(--gray); font-weight:bold;">FAVORİLER (BIST 30)</div>
        </div>
        <div class="content" id="stockList">
            </div>
    </div>

    <div id="analiz-page" class="page">
        <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
            <button class="back-btn" onclick="showPage('home-page')">← Geri</button>
            <span id="selectedSymbol" style="font-weight:bold; color:var(--green);">DETAY</span>
        </div>
        <div id="chartContainer" style="flex:1;"></div>
    </div>

    <div id="news-page" class="page">
        <div class="header">📋 Günlük Bülten</div>
        <div class="content" style="padding:20px; color:var(--gray); text-align:center;">
            <p>Bugün piyasalar yatay seyrediyor.<br>SASA ve HEKTS takibimizde.</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('home-page', this)">
            <span class="nav-icon">🏠</span><span>Piyasa</span>
        </div>
        <div class="nav-item" onclick="showPage('news-page', this)">
            <span class="nav-icon">📋</span><span>Bülten</span>
        </div>
        <div class="nav-item" onclick="tg.close()">
            <span class="nav-icon">🚪</span><span>Çıkış</span>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp; tg.expand();

    // Hisse Datası (Buraya istediğin kadar ekle kanka)
    const stocks = [
        {s: "THYAO", n: "Türk Hava Yolları", f: "296,00", d: "+1.25", c: "up", i: "turkish-airlines"},
        {s: "ASELS", n: "Aselsan", f: "330,50", d: "-1.78", c: "down", i: "aselsan"},
        {s: "TUPRS", n: "Tüpraş", f: "255,25", d: "+0.29", c: "up", i: "tupras"},
        {s: "SASA", n: "Sasa Polyester", f: "38,40", d: "-0.45", c: "down", i: "sasa-polyester"},
        {s: "MIATK", n: "Mia Teknoloji", f: "68,45", d: "+2.15", c: "up", i: "mia-teknoloji"},
        {s: "ASTOR", n: "Astor Enerji", f: "206,50", d: "+0.63", c: "up", i: "astor-enerji"},
        {s: "EREGL", n: "Ereğli Demir Çelik", f: "45,12", d: "+0.14", c: "up", i: "eregli-demir-celik"},
        {s: "LXGYO", n: "Luxera GMYO", f: "17,40", d: "+9.99", c: "up", i: "luxera-gayrimenkul"},
        {s: "BIMAS", n: "Bim Mağazalar", f: "691,00", d: "+1.78", c: "up", i: "bim-birlesik-magazalar"},
        {s: "KCHOL", n: "Koç Holding", f: "191,30", d: "+0.93", c: "up", i: "koc-holding"},
        {s: "GENKM", n: "Gentaş Kimya", f: "14,69", d: "+9.96", c: "up", i: "gentas"}
    ];

    function renderList(filter = "") {
        const listContainer = document.getElementById('stockList');
        listContainer.innerHTML = "";
        
        const filtered = stocks.filter(item => 
            item.s.toLowerCase().includes(filter.toLowerCase()) || 
            item.n.toLowerCase().includes(filter.toLowerCase())
        );

        filtered.forEach(item => {
            const row = document.createElement('div');
            row.className = 'hisse-row';
            row.onclick = () => openAnaliz(item.s);
            
            const logoUrl = `https://s3-symbol-logo.tradingview.com/${item.i}--big.svg`;
            
            row.innerHTML = `
                <div class="left">
                    <div class="logo"><img src="${logoUrl}" onerror="this.src='https://ui-avatars.com/api/?name=${item.s}&background=111&color=fff'"></div>
                    <div class="symbol-info">
                        <span class="symbol">${item.s}</span>
                        <span class="name">${item.n}</span>
                    </div>
                </div>
                <div class="right">
                    <div class="price">${item.f} ₺</div>
                    <span class="change ${item.c}">${item.d}%</span>
                </div>`;
            listContainer.appendChild(row);
        });
    }

    function handleSearch() {
        const val = document.getElementById('searchInput').value;
        renderList(val);
    }

    function showPage(pageId, navEl) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        
        if(navEl) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            navEl.classList.add('active');
        }
    }

    function openAnaliz(symbol) {
        showPage('analiz-page');
        document.getElementById('selectedSymbol').innerText = symbol + " ANALİZ";
        const container = document.getElementById('chartContainer');
        container.innerHTML = `<iframe id="chart-frame" src="https://s.tradingview.com/widgetembed/?symbol=BIST:${symbol}&interval=D&theme=dark&style=1&locale=tr"></iframe>`;
    }

    // İlk yükleme
    renderList();
</script>
</body>
</html>
