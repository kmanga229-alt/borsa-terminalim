<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST Shadow Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #0a0a0a; --green: #00ff88; --red: #ff3b30; --border: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .live-tag { background: rgba(0, 255, 136, 0.1); color: var(--green); padding: 4px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; border: 1px solid var(--green); }
        
        .hisse-row { background: var(--card); padding: 18px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); margin-bottom: 10px; transition: 0.2s; }
        .hisse-row:active { transform: scale(0.97); background: #111; }
        
        .symbol { font-weight: 800; font-size: 18px; letter-spacing: 0.5px; }
        .price-box { text-align: right; }
        .price { font-size: 17px; font-weight: bold; }
        .change { font-size: 12px; margin-top: 4px; font-weight: bold; }
        .up { color: var(--green); } .down { color: var(--red); }

        /* ANALİZ MODAL */
        #analiz { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        .nav { padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="header">
        <span style="font-weight:bold; font-size:18px;">BIST TERMİNAL</span>
        <div class="live-tag">● CANLI (20s Gecikme)</div>
    </div>

    <div id="liste"></div>

    <div id="analiz">
        <div class="nav"><b id="baslik"></b><button onclick="kapat()" style="background:#222;color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:bold;">Kapat</button></div>
        <div id="grafik" style="height:calc(100% - 65px); width:100%;"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();

        // Buraya hisseleri ekledikçe liste otomatik büyüyecek
        const hisseler = [
            {s: "THYAO", f: 296.00, d: 1.25}, {s: "ASELS", f: 330.50, d: -1.78},
            {s: "TUPRS", f: 255.25, d: 0.29}, {s: "LXGYO", f: 17.40, d: 9.99},
            {s: "SASA", f: 38.40, d: -0.45}, {s: "EREGL", f: 45.12, d: 0.10}
        ];

        function listele() {
            const l = document.getElementById('liste'); l.innerHTML = "";
            hisseler.forEach(h => {
                const c = h.d >= 0 ? 'up' : 'down';
                l.innerHTML += `
                    <div class="hisse-row" onclick="ac('${h.s}')">
                        <div class="symbol">${h.s}</div>
                        <div class="price-box">
                            <div class="price">${h.f.toFixed(2)} ₺</div>
                            <div class="change ${c}">${h.d >= 0 ? '+' : ''}%${h.d}</div>
                        </div>
                    </div>`;
            });
        }

        function ac(s) {
            document.getElementById('analiz').style.display = 'block';
            document.getElementById('baslik').innerText = s + " ANALİZ";
            // GOOGLE FİNANSIN "CANLIYA EN YAKIN" WIDGET'I
            // Bu yöntem BIST lisansına takılmadan en hızlı veriyi sunar.
            document.getElementById('grafik').innerHTML = `
                <iframe src="https://www.google.com/finance/quote/${s}:IST?window=1D" style="width:100%;height:100%;border:none;"></iframe>
            `;
        }

        function kapat() { document.getElementById('analiz').style.display = 'none'; document.getElementById('grafik').innerHTML = ""; }
        listele();
    </script>
</body>
</html>
