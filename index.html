<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #111; --green: #00ff88; --red: #ff3b30; --border: #222; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        .hisse-row { background: var(--card); padding: 16px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); margin-bottom: 10px; cursor: pointer; }
        .icon { width: 38px; height: 38px; border-radius: 50%; background: #222; display:flex; align-items:center; justify-content:center; font-weight:bold; color:#888; border:1px solid #333; margin-right:12px; }
        
        #analiz { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        .nav { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .back { background: #333; border: none; color: #fff; padding: 8px 15px; border-radius: 8px; font-weight: bold; }
        .chart-box { width: 100%; height: calc(100% - 65px); }
    </style>
</head>
<body>
    <div id="home">
        <div id="liste"></div>
    </div>

    <div id="analiz">
        <div class="nav"><b id="baslik"></b><button class="back" onclick="kapat()">Kapat</button></div>
        <div id="chart-container" class="chart-box"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();
        const data = [
            {s: "THYAO", n: "Türk Hava Yolları"}, {s: "ASELS", n: "Aselsan"},
            {s: "TUPRS", n: "Tüpraş"}, {s: "LXGYO", n: "Luxera GMYO"},
            {s: "SASA", n: "Sasa Polyester"}, {s: "ASTOR", n: "Astor Enerji"}
        ];

        function bas() {
            const l = document.getElementById('liste'); l.innerHTML = "";
            data.forEach(h => {
                l.innerHTML += `<div class="hisse-row" onclick="ac('${h.s}')">
                    <div style="display:flex;align-items:center"><div class="icon">${h.s[0]}</div>
                    <div><b>${h.s}</b><br><small style="color:#666">${h.n}</small></div></div>
                    <span style="color:#444">Detay ></span>
                </div>`;
            });
        }

        function ac(s) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('analiz').style.display = 'block';
            document.getElementById('baslik').innerText = s + " ANALİZ";
            
            // 🚀 ENGELLEMEYE TAKILMAYAN MİNİ GRAFİK MOTORU
            document.getElementById('chart-container').innerHTML = `
                <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=BIST%3A${s}&theme=dark&width=100%&height=100%&trendLineColor=%2300ff88&underLineColor=rgba(0%2C255%2C136%2C0.1)&locale=tr" 
                style="width:100%; height:100%; border:none;"></iframe>
            `;
        }

        function kapat() { document.getElementById('analiz').style.display = 'none'; document.getElementById('home').style.display = 'block'; }
        bas();
    </script>
</body>
</html>
