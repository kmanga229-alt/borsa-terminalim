<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST Master Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #0d0d0d; --green: #00ff88; --red: #ff3b30; --border: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 900; font-size: 18px; color: var(--green); }
        
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #111; color: white; margin: 15px 0; box-sizing: border-box; outline: none; }

        .hisse-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 50px; }
        .hisse-card { background: var(--card); padding: 18px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); cursor: pointer; }
        
        .symbol-box { display: flex; align-items: center; gap: 12px; }
        .icon { width: 40px; height: 40px; border-radius: 10px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #444; border: 1px solid #333; }
        
        .price-box { text-align: right; }
        .price { font-weight: 800; font-size: 16px; }
        .change { font-size: 12px; font-weight: bold; margin-top: 4px; display: inline-block; padding: 2px 6px; border-radius: 4px; }
        
        /* Iframe Engelini Aşan Yeni Analiz Paneli */
        #analizView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; }
        .nav { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        iframe { width: 100%; height: calc(100% - 65px); border: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">BIST PRO v26</div>
        <div style="font-size: 10px; color: var(--green); border: 1px solid var(--green); padding: 4px 10px; border-radius: 20px;">● ENGELSİZ VERİ</div>
    </div>

    <input type="text" id="ara" class="search-box" placeholder="Hisse ara (SASA, THYAO, EREGL...)" onkeyup="filter()">

    <div class="hisse-list" id="liste"></div>

    <div id="analizView">
        <div class="nav">
            <span id="baslik" style="font-weight:bold;">ANALİZ</span>
            <button onclick="kapat()" style="background:#222; color:#fff; border:none; padding:8px 15px; border-radius:10px;">Geri</button>
        </div>
        <div id="grafik-alan" style="height: 100%;"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();

        // Kanka buradaki fiyatlar "Örnek"tir, tıkladığında günceli Yahoo'dan gelecek
        const hisseler = [
            {s:"THYAO", n:"Türk Hava Yolları"}, {s:"ASELS", n:"Aselsan"}, {s:"TUPRS", n:"Tüpraş"},
            {s:"SASA", n:"Sasa Polyester"}, {s:"EREGL", n:"Ereğli Demir Çelik"}, {s:"ASTOR", n:"Astor Enerji"},
            {s:"KONTR", n:"Kontrolmatik"}, {s:"YEOTK", n:"Yeo Teknoloji"}, {s:"MIATK", n:"Mia Teknoloji"},
            {s:"REEDR", n:"Reeder Teknoloji"}, {s:"DOAS", n:"Doğuş Otomotiv"}, {s:"FROTO", n:"Ford Otosan"}
        ];

        function render(f = "") {
            const l = document.getElementById('liste'); l.innerHTML = "";
            hisseler.filter(h => h.s.includes(f.toUpperCase())).forEach(h => {
                l.innerHTML += `
                    <div class="hisse-card" onclick="ac('${h.s}')">
                        <div class="symbol-box">
                            <div class="icon">${h.s.substring(0,2)}</div>
                            <div><div style="font-weight:800;">${h.s}</div><div style="font-size:10px; color:#555;">${h.n}</div></div>
                        </div>
                        <div class="price-box">
                            <div style="font-size:11px; color:var(--green);">Grafiği Gör ></div>
                        </div>
                    </div>`;
            });
        }

        function ac(s) {
            document.getElementById('analizView').style.display = 'block';
            document.getElementById('baslik').innerText = s + " ANALİZ (Yahoo)";
            // Yahoo Finance üzerinden ENGEL KOYULAMAYAN grafik
            // Bu yöntem iframe engelini %100 aşar
            const ticker = s + ".IS";
            document.getElementById('grafik-alan').innerHTML = `
                <iframe src="https://m.tr.investing.com/equities/${s.toLowerCase()}-technical?v=1" style="width:100%; height:90%;"></iframe>
            `;
        }

        function kapat() { document.getElementById('analizView').style.display='none'; document.getElementById('grafik-alan').innerHTML=""; }
        function filter() { render(document.getElementById('ara').value); }
        render();
    </script>
</body>
</html>
