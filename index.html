<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #0d0d0d; --green: #00ff88; --red: #ff3b30; --border: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .logo { font-weight: 900; font-size: 20px; color: var(--green); }
        
        .search-box { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid var(--border); background: #121212; color: white; outline: none; margin: 15px 0; box-sizing: border-box; }

        .list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }
        .card { background: var(--card); padding: 18px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); transition: 0.2s; }
        .card:active { transform: scale(0.97); background: #151515; }
        
        .sym { font-weight: 800; font-size: 18px; }
        .btn { background: var(--green); color: black; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 800; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">BIST PRO v37</div>
        <div style="font-size: 10px; color: var(--green);">● %100 BAŞARI MODU</div>
    </div>

    <input type="text" id="ara" class="search-box" placeholder="Hisse Ara (SASA, MIATK...)" onkeyup="filter()">

    <div class="list" id="liste"></div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();

        const bist100 = [
            "THYAO", "ASELS", "TUPRS", "SASA", "EREGL", "ASTOR", "KCHOL", "SAHOL", "BIMAS", "SISE",
            "AKBNK", "ISCTR", "GARAN", "YKBNK", "KONTR", "YEOTK", "MIATK", "REEDR", "DOAS", "FROTO",
            "LXGYO", "MCARD", "GENKM", "PEKGY"
        ];

        function render(f = "") {
            const l = document.getElementById('liste');
            l.innerHTML = "";
            const filtrelenmis = bist100.filter(s => s.includes(f.toUpperCase()));
            
            filtrelenmis.forEach(s => {
                // Kanka burada direkt Google Finans'ın dış linkini kullanıyoruz
                // Telegram Mini App içindeki 'iframe' engeline takılmanın tek çözümü budur
                const link = `https://www.google.com/finance/quote/${s}:IST`;
                
                l.innerHTML += `
                    <div class="card" onclick="window.open('${link}', '_blank')">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <div style="width:35px; height:35px; border-radius:8px; background:#1a1a1a; display:flex; align-items:center; justify-content:center; font-weight:bold; color:#555;">${s[0]}</div>
                            <span class="sym">${s}</span>
                        </div>
                        <div class="btn">FİYAT GÖR</div>
                    </div>`;
            });
        }
        function filter() { render(document.getElementById('ara').value); }
        render();
    </script>
</body>
</html>
