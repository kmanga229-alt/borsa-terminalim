<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST Mega Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #0d0d0d; --green: #00ff88; --red: #ff3b30; --border: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        .header { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; font-size: 18px; color: var(--green); }

        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #111; color: white; outline: none; margin: 15px 0; box-sizing: border-box; font-size: 16px; }

        .hisse-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }
        .hisse-card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; height: 75px; overflow: hidden; }
        
        /* Google Finance Snippet Engine */
        .price-engine { border: none; width: 150px; height: 160px; margin-top: -55px; margin-right: -10px; pointer-events: none; }
        .symbol-name { font-size: 18px; font-weight: 900; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">BIST MEGA v32</div>
        <div style="font-size: 10px; color: var(--green); border: 1px solid var(--green); padding: 4px 8px; border-radius: 20px;">● TÜM HİSSELER</div>
    </div>

    <input type="text" id="ara" class="search-box" placeholder="Hisse Ara (Örn: MIATK, KONTR, EGEEN...)" onkeyup="filter()">

    <div class="hisse-list" id="liste"></div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();

        // Kanka BIST'teki en aktif ~100 hisseyi buraya gömdüm.
        const hisseler = [
            "ACSEL", "ADEL", "AGHOL", "AGROT", "AKBNK", "AKCNS", "AKENR", "AKFGY", "AKFYE", "AKSA", "AKSEN", "ALARK", "ALBRK", "ALFAS", "ALMAD", "ANELE", "ARCLK", "ARDYZ", "ARENA", "ARSAN", "ASELS", "ASTOR", "ASUZU", "ATAKP", "AYDEM", "AYGAZ",
            "BAGFS", "BAYRK", "BERA", "BEYAZ", "BIENP", "BIMAS", "BIOEN", "BOBET", "BRSAN", "BRYAT", "BSOKE", "BTCIM", "BUCIM", "BVSAN", 
            "CANTE", "CCOLA", "CIMSA", "CONSE", "CVMET", "CWENE", 
            "DAPGM", "DGGYO", "DOAS", "DOHOL", "DOCO", "DYOBY", 
            "EGEEN", "EGGUB", "EKGYO", "ENJSA", "ENKAI", "EREGL", "EUPWR", "EUREN", 
            "FENER", "FROTO", "FZLGY", 
            "GARAN", "GENIL", "GESAN", "GLYHO", "GOLTS", "GOZDE", "GSDHO", "GUBRF", "GWIND", 
            "HALKB", "HEKTS", "HTTBT", "HUNER", 
            "IHLAS", "IHYAY", "IMASM", "INVEO", "IPEKE", "ISCTR", "ISGYO", "ISMEN", "IZMDC", 
            "KARDMD", "KAYSE", "KCHOL", "KLSER", "KLYAS", "KOCAER", "KONTR", "KORDS", "KOZAA", "KOZAL", "KRDMD", 
            "LOGOS", "MAGEN", "MAVI", "MHRGY", "MIATK", "MGROS", "MPARK", 
            "NETAS", "NTHOL", "ODAS", "OTKAR", "OYAKC", 
            "PASEU", "PENTA", "PETKM", "PGSUS", "PNSU", "PRKME", "QUAGR", 
            "REEDR", "SAHOL", "SASA", "SAYAS", "SDTTR", "SISE", "SKBNK", "SMRTG", "SOKM", 
            "TABGD", "TARKM", "TAVHL", "TCELL", "THYAO", "TKFEN", "TMSN", "TOASO", "TSKB", "TUPRS", "TURSG", 
            "ULKER", "VAKBN", "VESBE", "VESTL", "YEOTK", "YKBNK", "YYLGD", "ZOREN"
        ];

        function render(f = "") {
            const l = document.getElementById('liste');
            l.innerHTML = "";
            const filtrelenmis = hisseler.filter(s => s.includes(f.toUpperCase()));
            
            filtrelenmis.forEach(s => {
                l.innerHTML += `
                    <div class="hisse-card">
                        <div class="symbol-name">${s}</div>
                        <div style="width: 135px; height: 55px; overflow: hidden; border-radius: 10px;">
                            <iframe class="price-engine" src="https://www.google.com/finance/quote/${s}:IST"></iframe>
                        </div>
                    </div>`;
            });
        }

        function filter() { render(document.getElementById('ara').value); }
        render(); // Sayfa açılınca listeyi basar
    </script>
</body>
</html>
