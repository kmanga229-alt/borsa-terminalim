<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #00ff88; font-family: sans-serif; margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: #0d0d0d; border: 1px solid #1a1a1a; color: #fff; padding: 25px 10px; border-radius: 15px; text-align: center; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn:active { background: #00ff88; color: #000; }
        .search { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #222; background: #111; color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>
    <div style="font-weight:900; font-size:22px; margin-bottom:15px;">BIST MASTER v53</div>
    <input type="text" id="ara" class="search" placeholder="Hisse Ara (SASA, THYAO...)" onkeyup="filter()">
    <div class="grid" id="liste"></div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const hisseler = ["THYAO", "ASELS", "TUPRS", "SASA", "EREGL", "ASTOR", "KCHOL", "SAHOL", "MIATK", "KONTR", "REEDR", "DOAS", "FROTO", "BIMAS", "SISE", "AKBNK", "LXGYO", "GENKM"];
        
        function render(f = "") {
            const l = document.getElementById('liste'); l.innerHTML = "";
            hisseler.filter(s => s.includes(f.toUpperCase())).forEach(s => {
                const d = document.createElement('div');
                d.className = 'btn'; d.innerText = s;
                d.onclick = () => { tg.sendData(s); tg.close(); };
                l.appendChild(d);
            });
        }
        function filter() { render(document.getElementById('ara').value); }
        render();
    </script>
</body>
</html>
