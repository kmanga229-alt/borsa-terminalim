<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST Terminal v42</title>
    <style>
        :root { --bg: #050505; --card: #0f0f0f; --green: #00ff88; --red: #ff3b30; --border: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        .header { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px 0; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #111; color: white; outline: none; margin: 10px 0; box-sizing: border-box; font-size: 16px; }

        .hisse-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; padding-bottom: 100px; }
        .hisse-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; height: 65px; overflow: hidden; }
        
        .symbol-name { font-weight: 900; font-size: 17px; letter-spacing: 0.5px; color: #eee; }

        /* 🚀 ENGELLENEMEYEN FİYAT MOTORU (Sniper v42) */
        .price-frame { border: none; width: 160px; height: 180px; margin-top: -65px; margin-right: -15px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:900; color:var(--green)">BIST MASTER v42</div>
        <div style="font-size: 10px; color: var(--green); border: 1px solid var(--green); padding: 3px 10px; border-radius: 20px;">● CANLI</div>
    </div>

    <input type="text" id="ara" class="search-box" placeholder="Hisse ara (THYAO, SASA, MIATK...)" onkeyup="filter()">

    <div class="hisse-list" id="liste"></div>

    <script>
        // Senin en çok takip ettiğin ve BIST 100'ün en aktif hisseleri
        const hisseler = [
            "THYAO", "ASELS", "TUPRS", "SASA", "EREGL", "ASTOR", "KCHOL", "SAHOL", "BIMAS", "SISE",
            "AKBNK", "ISCTR", "GARAN", "YKBNK", "KONTR", "YEOTK", "MIATK", "REEDR", "DOAS", "FROTO",
            "LXGYO", "PEKGY", "GENKM", "MCARD", "EGEEN", "ODAS", "PETKM", "HEKTS", "PGSUS", "TOASO"
        ];

        function render(f = "") {
            const l = document.getElementById('liste');
            l.innerHTML = "";
            const filtrelenmis = hisseler.filter(s => s.includes(f.toUpperCase()));
            
            // Dondurmaması için (Lazy Loading)
            const gosterilecek = f === "" ? filtrelenmis.slice(0, 15) : filtrelenmis;
            
            gosterilecek.forEach(s => {
                l.innerHTML += `
                    <div class="hisse-card">
                        <div class="symbol-name">${s}</div>
                        <div style="width: 140px; height: 45px; overflow: hidden; border-radius: 10px;">
                            <iframe class="price-frame" src="https://m.tr.investing.com/equities/${s.toLowerCase()}" loading="lazy"></iframe>
                        </div>
                    </div>`;
            });
        }

        function filter() { render(document.getElementById('ara').value); }
        render();
    </script>
</body>
</html>
