<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST Master Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #111; --green: #00ff88; --border: #222; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        .header { padding: 10px 0; font-size: 20px; font-weight: bold; color: var(--green); margin-bottom: 5px; }
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #1a1a1a; color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        
        .hisse-list { display: flex; flex-direction: column; gap: 8px; padding-bottom: 50px; }
        .hisse-row { background: var(--card); padding: 10px 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); height: 60px; }
        
        /* LOGO KISMI (Çalışan Logo Kodu) */
        .logo-alan { display: flex; align-items: center; gap: 12px; flex: 1; }
        .logo-box { width: 38px; height: 38px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #222; }
        .logo-box img { width: 85%; height: 85%; object-fit: contain; }
        .symbol { font-weight: 800; font-size: 16px; }

        /* FİYAT KISMI (Çalışan Google Fiyat Kodu) */
        .price-engine { width: 130px; height: 45px; overflow: hidden; border-radius: 8px; position: relative; background: #000; }
        .price-iframe { border: none; width: 300px; height: 160px; position: absolute; top: -55px; right: -15px; pointer-events: none; }
    </style>
</head>
<body>

<div class="header">BIST MASTER v54</div>
<input type="text" id="ara" class="search-box" placeholder="Hisse ara (THYAO, MIATK...)" onkeyup="ara()">
<div class="hisse-list" id="liste"></div>

<script>
    const tg = window.Telegram.WebApp; tg.expand();

    // Logo id'leri ve hisse kodları
    const hisseler = [
        {s: "THYAO", tv: "turkish-airlines"}, {s: "ASELS", tv: "aselsan"},
        {s: "TUPRS", tv: "tupras"}, {s: "BIMAS", tv: "bim-birlesik-magazalar"},
        {s: "SASA", tv: "sasa-polyester"}, {s: "SAHOL", tv: "sabanci-holding"},
        {s: "KCHOL", tv: "koc-holding"}, {s: "MIATK", tv: "mia-teknoloji"},
        {s: "KONTR", tv: "kontrolmatik"}, {s: "EREGL", tv: "eregli-demir-celik"},
        {s: "ASTOR", tv: "astor-enerji"}, {s: "SISE", tv: "sise-cam"},
        {s: "AKBNK", tv: "akbank"}, {s: "LXGYO", tv: "luxera-gayrimenkul"},
        {s: "GENKM", tv: "gentas"}, {s: "REEDR", tv: "reeder-teknoloji"}
    ];

    function render(f = "") {
        const listDiv = document.getElementById('liste');
        listDiv.innerHTML = "";
        const filtered = hisseler.filter(x => x.s.includes(f.toUpperCase()));
        
        // Donmayı önlemek için ilk açılışta 15 tane yükler
        const gosterilecek = f === "" ? filtered.slice(0, 15) : filtered;

        gosterilecek.forEach(h => {
            const logoUrl = `https://s3-symbol-logo.tradingview.com/${h.tv}--big.svg`;
            listDiv.innerHTML += `
                <div class="hisse-row">
                    <div class="logo-alan">
                        <div class="logo-box">
                            <img src="${logoUrl}" onerror="this.src='https://ui-avatars.com/api/?name=${h.s}&background=111&color=fff'">
                        </div>
                        <div class="symbol">${h.s}</div>
                    </div>
                    <div class="price-engine">
                        <iframe class="price-iframe" src="https://www.google.com/finance/quote/${h.s}:IST" loading="lazy"></iframe>
                    </div>
                </div>`;
        });
    }

    function ara() { render(document.getElementById('ara').value); }
    render();
</script>
</body>
</html>
