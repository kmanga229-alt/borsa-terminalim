<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST Master Terminal</title>
    <style>
        :root { --bg: #000; --card: #0a0a0a; --green: #00ff88; --red: #ff3b30; --border: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        .section-header { font-size: 14px; font-weight: 800; color: #555; margin: 15px 5px 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Liste Tasarımı */
        .list-container { display: flex; flex-direction: column; gap: 2px; background: var(--border); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .row { background: var(--card); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .row:active { background: #111; }
        
        .symbol-area { display: flex; align-items: center; gap: 12px; }
        .symbol-name { font-weight: 800; font-size: 16px; }
        
        /* Grafik Paneli (Popup) */
        #chartModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        .top-nav { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .close-btn { background: #222; border: none; color: #fff; padding: 8px 15px; border-radius: 8px; font-weight: bold; }
        
        iframe { border: none; }
    </style>
</head>
<body>

    <div style="height: 40px; margin-bottom: 10px;">
        <iframe src="https://s.tradingview.com/embed-widget/ticker-tape/?symbols=BIST%3AXU100%7C1D%2CBIST%3ATHYAO%7C1D%2CBIST%3AASELS%7C1D%2CBIST%3ATUPRS%7C1D&theme=dark&locale=tr" width="100%" height="100%"></iframe>
    </div>

    <div class="section-header">Hisse Takip Listesi</div>
    <div class="list-container" id="hisseList">
        </div>

    <div class="section-header">Piyasa Haberleri</div>
    <div style="height: 400px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border);">
        <iframe src="https://s.tradingview.com/embed-widget/timeline/?feedMode=market&market=stock&symbol=BIST%3AXU100&theme=dark&locale=tr" width="100%" height="100%"></iframe>
    </div>

    <div id="chartModal">
        <div class="top-nav">
            <span id="targetName" style="font-weight:900; color:var(--green);">ANALİZ</span>
            <button class="close-btn" onclick="closeChart()">Kapat</button>
        </div>
        <div id="chartContainer" style="height: calc(100% - 65px);"></div>
    </div>

    <script>
        const hisseler = ["THYAO", "ASELS", "TUPRS", "SASA", "EREGL", "ASTOR", "KCHOL", "SAHOL", "BIMAS", "LXGYO"];

        function init() {
            const container = document.getElementById('hisseList');
            hisseler.forEach(s => {
                container.innerHTML += `
                    <div class="row" onclick="openChart('${s}')">
                        <div class="symbol-area">
                            <div style="width:35px; height:35px; background:#1a1a1a; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; color:#444; border:1px solid #222;">${s.substring(0,2)}</div>
                            <div class="symbol-name">${s}</div>
                        </div>
                        <div style="width:140px; height:45px;">
                            <iframe src="https://s.tradingview.com/embed-widget/single-quote/?symbol=BIST%3A${s}&theme=dark&locale=tr" width="100%" height="100%" scrolling="no"></iframe>
                        </div>
                    </div>`;
            });
        }

        function openChart(s) {
            document.getElementById('chartModal').style.display = 'block';
            document.getElementById('targetName').innerText = s + " TEKNİK ANALİZ";
            // Bu widget analiz özetini, al-sat sinyalini ve pivotları CANLI gösterir.
            document.getElementById('chartContainer').innerHTML = `
                <iframe src="https://s.tradingview.com/embed-widget/technical-analysis/?symbol=BIST%3A${s}&theme=dark&locale=tr&interval=1D&width=100%&height=100%" width="100%" height="100%"></iframe>
            `;
        }

        function closeChart() {
            document.getElementById('chartModal').style.display = 'none';
            document.getElementById('chartContainer').innerHTML = "";
        }

        init();
    </script>
</body>
</html>
