<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST Pro Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --green: #00ff88; --red: #ff4444; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; }
        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; margin-bottom: 20px; box-sizing: border-box; }
        .hisse-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        .hisse-card { background: var(--card); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .hisse-card:active { transform: scale(0.98); background: #222; }
        .logo-box { width: 38px; height: 38px; background: linear-gradient(45deg, #222, #333); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; color: #aaa; font-size: 14px; border: 1px solid #444; }
        .flex-row { display: flex; align-items: center; }
        .code { font-weight: bold; font-size: 16px; }
        .price { font-weight: bold; text-align: right; }
        .up { color: var(--green); } .down { color: var(--red); }
        
        /* Detay Ekranı (Tıklayınca Açılan Yer) */
        #detailModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; overflow-y: auto; }
        .modal-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; background: #111; }
        .close-btn { background: #333; color: #fff; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .premium-lock { background: #1a1a1a; margin: 15px; padding: 20px; border-radius: 10px; border: 1px dashed #444; text-align: center; }
    </style>
</head>
<body>
    <div id="mainScreen">
        <input type="text" id="ara" class="search-box" placeholder="🔍 Hisse ara (THYAO, SASA...)" onkeyup="hisseAra()">
        <div class="hisse-list" id="liste"></div>
    </div>
