<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST Real-Time</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #0d0d0d; --green: #00ff88; --red: #ff3b30; --border: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        .header { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #111; color: white; outline: none; margin: 15px 0; box-sizing: border-box; }
        .hisse-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 50px; }
        .hisse-card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; height: 70px; overflow: hidden; }
        /* Google Finance'ı tam fiyat bölgesinden yakalayan 'Sniper' Frame */
        .price-engine { border: none; width: 140px; height: 150px; margin-top: -55px; margin-right: -10px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="header"><b style="color:var(--green)">BIST LIVE v31</b><span>● CANLI</span></div>
    <input type="text" id="ara" class="search-box" placeholder="Hisse Ara (SASA, THYAO...)" onkeyup="filter()">
    <div class="hisse-list" id="liste"></div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();
        const hisseler = ["THYAO", "ASELS", "TUPRS", "SASA", "EREGL", "ASTOR", "KCHOL", "SAHOL", "BIMAS", "SISE", "KONTR", "MIATK", "REEDR"];

        function render(f = "") {
            const l = document.getElementById('liste');
            l.innerHTML = "";
            hisseler.filter(s => s.includes(f.toUpperCase())).forEach(s => {
                l.innerHTML += `
                    <div class="hisse-card">
                        <b style="font-size:18px;">${s}</b>
                        <div style="width: 130px; height: 50px; overflow: hidden; border-radius: 10px;">
                            <iframe class="price-engine" src="https://www.google.com/finance/quote/${s}:IST"></iframe>
                        </div>
                    </div>`;
            });
        }
        function filter() { render(document.getElementById('ara').value); }
        render();
    </script>
</body>
</html>
