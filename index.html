<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST Terminal v23</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .hisse-list { display: flex; flex-direction: column; gap: 15px; }
        .hisse-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 10px; }
        .widget-container { height: 150px; width: 100%; overflow: hidden; border-radius: 8px; }
        h2 { color: #00ff88; text-align: center; font-size: 18px; }
    </style>
</head>
<body>
    <h2>🚀 BIST CANLI TERMİNAL</h2>
    <div class="hisse-list" id="liste"></div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); tg.ready();
        
        // Takip etmek istediğin hisseleri buraya yaz kanka
        const hisseler = ["THYAO", "ASELS", "TUPRS", "SASA", "EREGL"];

        function baslat() {
            const container = document.getElementById('liste');
            hisseler.forEach(s => {
                const div = document.createElement('div');
                div.className = 'hisse-card';
                // Bu widget hem fiyatı hem ufak grafiği aynı anda hatasız gösterir
                div.innerHTML = `
                    <div class="widget-container">
                        <iframe src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?symbol=BIST%3A${s}&theme=dark&width=100%&height=100%&trendLineColor=%2300ff88&underLineColor=rgba(0%2C255%2C136%2C0.1)&locale=tr" frameborder="0" style="width:100%; height:100%;"></iframe>
                    </div>`;
                container.appendChild(div);
            });
        }
        baslat();
    </script>
</body>
</html>
