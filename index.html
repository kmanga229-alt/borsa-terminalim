<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST PRO v41</title>
    <style>
        :root { --bg: #050505; --card: #0f0f0f; --green: #00ff88; --red: #ff3b30; --border: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        .header { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px 0; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
        .search { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: #111; color: white; outline: none; margin-top: 10px; box-sizing: border-box; }

        .list { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; padding-bottom: 100px; }
        .card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; height: 65px; overflow: hidden; }
        
        .symbol-name { font-weight: 800; font-size: 17px; letter-spacing: 0.5px; }

        /* Yahoo Finance Sniper: Asla Beyaz Kutu Vermez */
        .price-engine { border: none; width: 150px; height: 180px; margin-top: -65px; margin-right: -10px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:900; color:var(--green)">BIST MASTER v41</div>
        <div style="font-size:10px; color:var(--green); border:1px solid var(--green); padding:3px 8px; border-radius:15px;">● KESİN VERİ</div>
    </div>

    <input type="text" id="ara" class="search" placeholder="Hisse ara (THYAO, SASA...)" onkeyup="filter()">

    <div class="list" id="liste"></div>

    <script>
        const hisseler = [
            "LXGYO", "GENKM", "THYAO", "SAHOL", "ASELS", "TUPRS", "BIMAS", "KCHOL", "SASA", "EREGL",
            "ASTOR", "KONTR", "YEOTK", "MIATK", "REEDR", "DOAS", "FROTO", "EGEEN", "PETKM", "HEKTS"
        ];

        function render(f = "") {
            const l = document.getElementById('liste');
            l.innerHTML = "";
            const filtered = hisseler.filter(s => s.includes(f.toUpperCase()));
            
            filtered.forEach(s => {
                l.innerHTML += `
                    <div class="card">
                        <div class="symbol-name">${s}</div>
                        <div style="width: 140px; height: 50px; overflow: hidden; border-radius: 8px;">
                            <iframe class="price-engine" src="https://m.tr.investing.com/equities/${s.toLowerCase()}" loading="lazy"></iframe>
                        </div>
                    </div>`;
            });
        }
        function filter() { render(document.getElementById('ara').value); }
        render();
    </script>
</body>
</html>
