<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST Terminal PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #0d0d0d; --green: #00ff88; --red: #ff3b30; --border: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* Sabit Üst Panel */
        .header { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px 5px; border-bottom: 1px solid var(--border); }
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #111; color: white; outline: none; font-size: 16px; box-sizing: border-box; }

        /* Hisse Listesi */
        .hisse-list { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; padding-bottom: 100px; }
        .hisse-card { background: var(--card); padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); cursor: pointer; }
        
        .symbol-info { display: flex; align-items: center; gap: 12px; }
        .icon-circle { width: 40px; height: 40px; border-radius: 10px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #444; border: 1px solid #333; }
        
        .price-frame { width: 120px; height: 45px; border: none; overflow: hidden; pointer-events: none; }
    </style>
</head>
<body>

    </div>
