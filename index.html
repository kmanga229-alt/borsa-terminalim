<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST Master Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #0d0d0d; --green: #00ff88; --red: #ff3e3e; --border: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #111; color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        
        .hisse-list { display: flex; flex-direction: column; gap: 8px; padding-bottom: 80px; }
        .hisse-row { background: var(--card); padding: 12px 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); cursor: pointer; height: 65px; }
        
        .logo-box { width: 38px; height: 38px; border-radius: 50%; background: #1a1a1a; margin-right: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #333; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .symbol { font-weight: 800; font-size: 16px; }

        /* 🚀 OTOMATİK FİYAT MOTORU (BEYAZ KUTU VERMEZ) */
        .price-engine { width: 130px; height: 45px; overflow: hidden; border-radius: 8px; position: relative; }
        .price-iframe { border: none; width: 160px; height: 160px; position: absolute; top: -55px; right: -15px; pointer-events: none; }
        
        #analizView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        .nav-bar { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div id="home">
    <div style="font-weight:900; font-size:20px; color:var(--green); margin-bottom:15px;">BIST MASTER v48 ● OTOMATİK</div>
    <input type="text" id="ara" class="search-box" placeholder="Hisse ara..." onkeyup="ara()">
    <div class="hisse-list" id="liste"></div>
</div>

<div id="analizView">
    <div class="nav-bar"><span id="baslik">ANALİZ</span><button onclick="kapat()" style="background:#222;color:white;border:none;padding:8px 15px;border-radius:8px;">Kapat</button></div>
    <div id="iframeContainer" style="width:100%; height:calc(100% - 60px);"></div>
</div>

<script>
    const tg = window.Telegram.WebApp; tg.expand(); tg.ready();

    const hisseler = [
        {s: "THYAO", i: "turkish-airlines"}, {s: "ASELS", i: "aselsan"},
        {s: "TUPRS", i: "tupras"}, {s: "BIMAS", i: "bim-birlesik-magazalar"},
        {s: "SASA", i: "sasa-polyester"}, {s: "SAHOL", i: "sabanci-holding"},
        {s: "KCHOL", i: "koc-holding"}, {s: "MIATK", i: "mia-teknoloji"},
        {s: "KONTR", i: "kontrolmatik"}, {s: "EREGL", i: "eregli-demir-celik"},
        {s: "ASTOR", i: "astor-enerji"}, {s: "SISE", i: "sise-cam"},
        {s: "AKBNK", i: "akbank"}, {s: "LXGYO", i: "luxera-gayrimenkul"}
    ];

    function render(f = "") {
        const listDiv = document.getElementById('liste');
        listDiv.innerHTML = "";
        hisseler.filter(x => x.s.includes(f.toUpperCase())).forEach(h => {
            const logoUrl = `https://s3-symbol-logo.tradingview.com/${h.i}--big.svg`;
            listDiv.innerHTML += `
                <div class="hisse-row" onclick="ac('${h.s}')">
                    <div style="display:flex;align-items:center">
                        <div class="logo-box"><img src="${logoUrl}" onerror="this.src='https://ui-avatars.com/api/?name=${h.s}&background=1a1a1a&color=fff'"></div>
                        <div class="symbol">${h.s}</div>
                    </div>
                    <div class="price-engine">
                        <iframe class="price-iframe" src="https://www.google.com/finance/quote/${h.s}:IST" loading="lazy"></iframe>
                    </div>
                </div>`;
        });
    }

    function ac(s) {
        document.getElementById('home').style.display = 'none';
        document.getElementById('analizView').style.display = 'block';
        document.getElementById('baslik').innerText = s + " ANALİZ";
        const url = `https://s.tradingview.com/widgetembed/?symbol=BIST:${s}&interval=D&theme=dark&style=1&locale=tr`;
        document.getElementById('iframeContainer').innerHTML = `<iframe src="${url}" style="width:100%;height:100%;border:none;"></iframe>`;
    }

    function kapat() {
        document.getElementById('analizView').style.display = 'none';
        document.getElementById('home').style.display = 'block';
        document.getElementById('iframeContainer').innerHTML = "";
    }

    function ara() { render(document.getElementById('ara').value); }
    render();
</script>
</body>
</html>
